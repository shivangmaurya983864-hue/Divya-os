<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen's Academy | NEET Class 12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #FFFDF5; 
            min-height: 100vh;
            color: #1e293b;
        }

        /* --- MEDICAL ID CARD MODAL --- */
        #idCardOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .medical-id {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.4);
            animation: cardEntrance 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .id-header {
            background: #1e293b;
            padding: 45px 20px;
            text-align: center;
            color: white;
        }

        .id-photo-container {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            border: 6px solid white;
            margin: -60px auto 20px;
            overflow: hidden;
            background: #eee;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        /* --- PREMIUM TOPIC OVERLAY --- */
        #topicOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.98), #020617);
            backdrop-filter: blur(25px);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .topic-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            position: relative;
            animation: modalFadeUp 0.5s ease;
        }

        @keyframes modalFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topic-pill {
            background: white;
            padding: 20px 24px;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .topic-pill:hover {
            transform: scale(1.03) translateX(8px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .topic-pill .play-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: 0.3s;
        }

        .topic-pill:hover .play-icon {
            background: #10b981;
            color: white;
            transform: rotate(360deg);
        }

        /* --- UI COMPONENTS --- */
        .nav-glass {
            background: rgba(255, 253, 245, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .chapter-box {
            background: white; border-radius: 30px; padding: 25px; border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative;
            overflow: hidden; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }
        .chapter-box:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1); }

        .icon-circle { width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; background: white; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

        .weightage-tag { position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.05); color: inherit; font-size: 9px; padding: 5px 12px; border-radius: 100px; font-weight: 900; text-transform: uppercase; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="idCardOverlay" onclick="closeID()">
    <div class="medical-id" onclick="event.stopPropagation()">
        <div class="id-header">
            <h4 class="text-[11px] font-black tracking-[3px] opacity-70">QUEEN'S ACADEMY</h4>
            <h2 class="text-sm font-bold mt-1 uppercase">Medical Division</h2>
        </div>
        <div class="id-photo-container">
            <img src="divya.jpg" class="w-full h-full object-cover">
        </div>
        <div class="px-10 pb-12 text-center">
            <h1 class="text-3xl font-black text-slate-900 mb-1">Divya Maurya</h1>
            <p class="text-indigo-600 font-black text-[10px] tracking-widest uppercase mb-8">MBBS Aspirant • Batch 2026</p>
            <div class="space-y-4 border-t border-slate-100 pt-8 text-left">
                <div class="flex justify-between">
                    <span class="text-[9px] font-black text-slate-400 uppercase">Target</span>
                    <span class="text-sm font-black text-emerald-600">AIIMS DELHI / 720</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="topicOverlay" onclick="closeTopics()">
    <div class="topic-container" onclick="event.stopPropagation()">
        <div class="text-center mb-10">
            <h2 id="targetChapter" class="text-white text-3xl font-black mb-2 tracking-tight">Chapter Name</h2>
            <div class="flex items-center justify-center gap-3">
                <span class="h-[1px] w-8 bg-emerald-500/50"></span>
                <p class="text-emerald-400 text-[10px] font-black tracking-[4px] uppercase">Curriculum Mission</p>
                <span class="h-[1px] w-8 bg-emerald-500/50"></span>
            </div>
        </div>
        
        <div id="topicsList" class="w-full flex flex-col max-h-[55vh] overflow-y-auto no-scrollbar px-1">
            </div>

        <div class="flex justify-center mt-10">
            <button onclick="closeTopics()" class="text-white/40 uppercase tracking-[3px] text-[10px] font-black hover:text-white transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Close Arena
            </button>
        </div>
    </div>
</div>

<nav class="nav-glass p-5">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="font-black text-lg tracking-tighter uppercase">Queen's <span class="text-emerald-500">Arena</span></h1>
        <div onclick="openID()" class="w-12 h-12 rounded-full border-4 border-white shadow-xl overflow-hidden cursor-pointer hover:scale-110 active:scale-95 transition-all">
            <img src="divya.jpg" class="w-full h-full object-cover">
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-8">
    <div class="mb-12">
        <h2 class="text-5xl font-black tracking-tighter text-slate-900 mb-2">Class 12th Biology</h2>
        <p class="text-slate-500 font-medium italic">"Every cell you study brings you closer to your stethoscope." 🩺</p>
    </div>

    <div id="chaptersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
</main>

<script>
const fullSyllabus = [
    { n: "Reproduction in Organisms", e: "🌱", c: "#ECFEFF", t: "#0e7490", topics: ["Lifespan", "Reproduction", "Asexual Reproduction", "Sexual Reproduction"] },
    { n: "Sexual Reproduction in Flowering Plants", e: "🌸", c: "#F0FDF4", t: "#15803d", w: "High Weightage", topics: ["Flower Structure", "Microsporogenesis", "Megasporogenesis", "Pollination", "Post-fertilisation Events", "Seed and Fruit", "Apomixis"] },
    { n: "Human Reproduction", e: "👶", c: "#FEF2F2", t: "#b91c1c", w: "V. Important", topics: ["Male System", "Female System", "Gametogenesis", "Menstrual Cycle", "Fertilisation", "Pregnancy", "Parturition"] },
    { n: "Reproductive Health", e: "💊", c: "#FFF7ED", t: "#c2410c", topics: ["Birth Control", "MTP", "STIs", "Infertility & ART"] },
    { n: "Principles of Inheritance", e: "🧬", c: "#EEF2FF", t: "#4338ca", w: "King Chapter", topics: ["Mendel’s Laws", "Inheritance Genes", "Chromosomal Theory", "Sex Determination", "Mutation", "Genetic Disorders"] },
    { n: "Molecular Basis of Inheritance", e: "🧪", c: "#F5F3FF", t: "#6d28d9", w: "High Yield", topics: ["The DNA", "Replication", "Transcription", "Genetic Code", "Translation", "Gene Expression", "HGP", "DNA Fingerprinting"] },
    { n: "Evolution", e: "🧠", c: "#FDF2F8", t: "#be185d", topics: ["Origin of Life", "Evolution Theories", "Mechanism", "Hardy-Weinberg", "Adaptive Radiation"] },
    { n: "Human Health and Disease", e: "🌿", c: "#F0FDFA", t: "#0f766e", topics: ["Common Diseases", "Immunity", "AIDS", "Cancer", "Drugs Abuse"] },
    { n: "Food Production Enhancement", e: "🦠", c: "#F1F5F9", t: "#334155", topics: ["Animal Husbandry", "Plant Breeding", "SCP", "Tissue Culture"] },
    { n: "Microbes in Human Welfare", e: "🧫", c: "#FEFCE8", t: "#a16207", topics: ["Household", "Industrial", "Sewage Treatment", "Biogas", "Biocontrol"] },
    { n: "Biotechnology: Principles", e: "🧬", c: "#E0F2FE", t: "#0369a1", topics: ["Principles", "R-DNA Tools", "Biotech Processes"] },
    { n: "Biotechnology: Applications", e: "🧪", c: "#F0FDF4", t: "#15803d", topics: ["Agriculture Apps", "Medicine Apps", "Transgenic Animals", "Ethical Issues"] },
    { n: "Organisms and Populations", e: "🌍", c: "#FFFBEB", t: "#b45309", topics: ["Environment", "Population Growth", "Interactions"] },
    { n: "Ecosystem", e: "🌳", c: "#F0FDF4", t: "#15803d", topics: ["Structure & Function", "Productivity", "Decomposition", "Energy Flow", "Ecological Pyramids"] },
    { n: "Biodiversity & Conservation", e: "🌏", c: "#FEF2F2", t: "#b91c1c", topics: ["Patterns", "Loss of Biodiversity", "Conservation"] },
    { n: "Environmental Issues", e: "🌐", c: "#ECFEFF", t: "#0e7490", topics: ["Pollution", "Solid Waste", "Global Warming", "Ozone Depletion"] }
];

function openID() { document.getElementById('idCardOverlay').style.display = 'flex'; }
function closeID() { document.getElementById('idCardOverlay').style.display = 'none'; }

function renderChapters() {
    const grid = document.getElementById('chaptersGrid');
    grid.innerHTML = "";
    
    fullSyllabus.forEach(ch => {
        const card = document.createElement('div');
        card.className = "chapter-box";
        card.style.backgroundColor = ch.c;
        card.style.color = ch.t;
        card.onclick = () => openTopics(ch.n);
        
        card.innerHTML = `
            ${ch.w ? `<span class="weightage-tag" style="background: ${ch.t}15">${ch.w}</span>` : ''}
            <div class="icon-circle">${ch.e}</div>
            <h3 class="font-black text-xl leading-tight mb-2">${ch.n}</h3>
            <p class="text-[10px] opacity-60 font-bold uppercase tracking-widest">Medical Aspirant Goal</p>
            <div class="mt-8 flex justify-between items-center opacity-40">
                <span class="text-[9px] font-black uppercase tracking-[2px]">Explore Topics</span>
                <i class="fas fa-chevron-right text-sm"></i>
            </div>
        `;
        grid.appendChild(card);
    });
}

function openTopics(name) {
    const chapter = fullSyllabus.find(c => c.n === name);
    const topicsList = document.getElementById('topicsList');
    document.getElementById('targetChapter').innerText = name;
    
    topicsList.innerHTML = "";
    chapter.topics.forEach((topic, index) => {
        const div = document.createElement('div');
        div.className = "topic-pill";
        // Apply chapter theme colors to the topic pills
        div.style.backgroundColor = chapter.c;
        div.style.color = chapter.t;
        div.onclick = () => startTest(name, topic);
        
        div.innerHTML = `
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black opacity-30">${String(index + 1).padStart(2, '0')}</span>
                <span class="text-sm font-black tracking-wide">${topic}</span>
            </div>
            <div class="play-icon">
                <i class="fas fa-play"></i>
            </div>
        `;
        topicsList.appendChild(div);
    });

    document.getElementById('topicOverlay').style.display = 'flex';
}

function closeTopics() { document.getElementById('topicOverlay').style.display = 'none'; }

function startTest(ch, topic) {
    localStorage.setItem("selectedClass", "12");
    localStorage.setItem("selectedSubject", "Biology");
    localStorage.setItem("selectedChapter", ch);
    localStorage.setItem("selectedTopic", topic);
    window.location.href = "test.html";
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeTopics(); closeID(); }
});

renderChapters();
</script>
</body>
</html>
