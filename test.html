<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET Elite | Divya Maurya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="questions.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --primary: #6366f1; --dark: #0f172a; --accent: #10b981; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: var(--dark); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            user-select: none;
        }

        .premium-nav { 
            background: white; 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 20px -10px rgba(0,0,0,0.05);
        }

        .timer-box {
            background: var(--dark);
            color: white;
            padding: 8px 16px;
            border-radius: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .test-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 150px;
        }

        .q-card {
            background: white;
            border-radius: 35px;
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
        }

        .option-btn {
            width: 100%;
            padding: 20px;
            margin-top: 12px;
            border-radius: 22px;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #f5f3ff;
            transform: scale(1.02);
        }

        .opt-id {
            width: 35px;
            height: 35px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        .selected .opt-id {
            background: var(--primary);
            color: white;
        }

        /* Bottom Controls */
        .dock {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-action {
            flex: 1;
            height: 60px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
        }

        .btn-next { background: var(--primary); flex: 1.8; font-size: 12px; }
        .btn-clear { background: rgba(255,255,255,0.1); }
        .btn-finish { background: #ef4444; }

        /* Drawer */
        #drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 40px 40px 0 0;
            z-index: 2000;
            padding: 30px 25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #drawer.open { bottom: 0; }

        .dot {
            aspect-ratio: 1;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 2px solid transparent;
        }
        .dot.active { border-color: var(--primary); color: var(--primary); }
        .dot.done { background: var(--accent); color: white; }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 1500;
        }
    </style>
</head>
<body>

<div id="overlay"></div>

<nav class="premium-nav">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div onclick="toggleDrawer()" class="flex items-center gap-3 cursor-pointer">
            <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                <i class="fas fa-grid-2"></i>
            </div>
            <div>
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Divya Maurya</h4>
                <p class="text-sm font-extrabold" id="chapterTitle">Loading...</p>
            </div>
        </div>
        <div class="timer-box" id="timer">00:00</div>
    </div>
</nav>

<div class="test-area">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6 px-2">
            <span class="text-[11px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full uppercase">Question <span id="currentNum">1</span></span>
            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">NEET 2026 Focus</span>
        </div>
        
        <div class="q-card">
            <h2 id="questionText" class="text-lg font-bold leading-snug text-slate-800">...</h2>
            <div id="optionsGrid" class="mt-8"></div>
        </div>
    </div>
</div>

<div class="dock">
    <button onclick="clearSelection()" class="btn-action btn-clear">
        <i class="fas fa-eraser mb-1"></i> Clear
    </button>
    <button onclick="nextQuestion()" class="btn-action btn-next">
        <span>Save & Next</span>
        <i class="fas fa-chevron-right mt-0.5 text-[8px] opacity-50"></i>
    </button>
    <button onclick="finishTest()" class="btn-action btn-finish">
        <i class="fas fa-check-double mb-1"></i> Finish
    </button>
</div>

<div id="drawer">
    <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-8"></div>
    <div class="flex justify-between items-center mb-6">
        <h3 class="font-black text-xl uppercase italic">Progress Map</h3>
        <span class="text-xs font-bold text-slate-400" id="statText">0/0 Completed</span>
    </div>
    <div id="palette" class="grid grid-cols-5 gap-3 max-h-[40vh] overflow-y-auto no-scrollbar"></div>
    <button onclick="toggleDrawer()" class="w-full mt-8 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Close Map</button>
</div>

<script>
    const selectedChapter = localStorage.getItem("selectedChapter") || "Reproduction";
    const selectedTopic = localStorage.getItem("selectedTopic");
    
    // Filter questions based on selected chapter and topic from questions.js
    let questions = [];
    if(allQuestions[selectedChapter] && allQuestions[selectedChapter][selectedTopic]) {
        questions = allQuestions[selectedChapter][selectedTopic];
    }

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    // Automatic timer: 1 minute per question
    let timeLeft = questions.length * 60; 

    function init() {
        if(questions.length === 0) {
            alert("Bhai, questions load nahi hue! Check questions.js");
            window.location.href = "sets.html";
            return;
        }
        document.getElementById('chapterTitle').innerText = selectedChapter;
        renderQuestion();
        startTimer();
        renderPalette();
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('currentNum').innerText = currentIdx + 1;
        document.getElementById('questionText').innerText = q.question;
        
        let html = "";
        q.options.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            const isSelected = userAnswers[currentIdx] === letter ? 'selected' : '';
            html += `
                <button onclick="selectOption('${letter}')" class="option-btn ${isSelected}">
                    <div class="opt-id">${letter}</div>
                    <span class="font-bold text-slate-700">${opt}</span>
                </button>
            `;
        });
        document.getElementById('optionsGrid').innerHTML = html;
        updateStats();
    }

    function selectOption(letter) {
        userAnswers[currentIdx] = letter;
        renderQuestion();
        renderPalette();
    }

    function clearSelection() {
        userAnswers[currentIdx] = null;
        renderQuestion();
        renderPalette();
    }

    function nextQuestion() {
        if(currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
            renderPalette();
        } else {
            toggleDrawer(); // End of questions, show map
        }
    }

    function renderPalette() {
        let html = "";
        userAnswers.forEach((ans, i) => {
            let cls = "dot";
            if(i === currentIdx) cls += " active";
            if(ans !== null) cls += " done";
            html += `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
        });
        document.getElementById('palette').innerHTML = html;
    }

    function jumpTo(i) {
        currentIdx = i;
        renderQuestion();
        toggleDrawer();
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').style.display = 
            document.getElementById('drawer').classList.contains('open') ? 'block' : 'none';
    }

    function updateStats() {
        const done = userAnswers.filter(a => a !== null).length;
        document.getElementById('statText').innerText = `${done}/${questions.length} Completed`;
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            if(timeLeft <= 0) {
                clearInterval(interval);
                finishTest();
            } else {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                
                // Red timer warning for last 2 minutes
                if(timeLeft < 120) timerEl.style.color = "#ef4444";
            }
        }, 1000);
    }

    function finishTest() {
        let correct = 0;
        let wrong = 0;
        
        userAnswers.forEach((ans, i) => {
            if(ans !== null) {
                if(ans === questions[i].answer) correct++;
                else wrong++;
            }
        });

        const score = (correct * 4) - (wrong * 1);
        
        localStorage.setItem("lastScore", JSON.stringify({
            correct, 
            wrong, 
            score, 
            total: questions.length,
            accuracy: Math.round((correct / (correct + wrong || 1)) * 100)
        }));
        
        localStorage.setItem("userAnswers", JSON.stringify(userAnswers));
        localStorage.setItem("lastQuestions", JSON.stringify(questions));
        
        window.location.href = "result.html";
    }

    // Modal Close on overlay click
    document.getElementById('overlay').onclick = toggleDrawer;

    init();
</script>
</body>
</html>
