<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queen Divya | The Royal Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Dancing+Script:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #ffcc33;
    --royal-purple: #6366f1;
    --pink-glow: #ff7eb3;
    --dark-bg: #050508;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--dark-bg);
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

/* --- Animated Background Mesh --- */
.mesh-bg {
    position: absolute;
    inset: 0;
    background: 
        radial-gradient(circle at 20% 30%, rgba(255, 126, 179, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
    filter: blur(80px);
    z-index: -1;
    animation: moveBg 15s infinite alternate linear;
}

@keyframes moveBg {
    from { transform: scale(1); }
    to { transform: scale(1.2) rotate(5deg); }
}

/* --- Premium Glass Card --- */
.luxe-card {
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 50px 60px;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.02);
    position: relative;
    max-width: 550px;
    width: 90%;
}

/* --- Golden Crown Animation --- */
.crown-icon {
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 50px;
    filter: drop-shadow(0 0 20px var(--gold));
    animation: floatCrown 3s ease-in-out infinite;
}

@keyframes floatCrown {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
    50% { transform: translateX(-50%) translateY(-15px) rotate(5deg); }
}

/* --- Profile Section --- */
.profile-wrap {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 0 auto 30px;
}

.outer-glow {
    position: absolute;
    inset: -5px;
    background: linear-gradient(45deg, var(--gold), var(--pink-glow), var(--royal-purple));
    border-radius: 50%;
    animation: rotateGlow 6s linear infinite;
}

@keyframes rotateGlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--dark-bg);
    position: relative;
    z-index: 2;
}

/* --- Typography --- */
.royal-name {
    font-family: 'Cinzel', serif;
    font-size: 70px;
    font-weight: 700;
    background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 0.9;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.quote-text {
    font-family: 'Dancing Script', cursive;
    font-size: 32px;
    color: var(--pink-glow);
    margin-bottom: 25px;
}

/* --- Luxury Button --- */
.btn-royal {
    background: linear-gradient(90deg, #fff, #fde68a);
    color: #000;
    padding: 18px 50px;
    border-radius: 100px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 13px;
    transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    box-shadow: 0 15px 30px rgba(255, 204, 51, 0.2);
    display: inline-block;
    border: none;
    cursor: pointer;
}

.btn-royal:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 25px 50px rgba(255, 204, 51, 0.4);
    letter-spacing: 5px;
}

/* --- Floating Particles --- */
.particle {
    position: absolute;
    pointer-events: none;
    opacity: 0.4;
    z-index: 10;
    filter: drop-shadow(0 0 10px gold);
}

@keyframes rise {
    0% { transform: translateY(100vh) rotate(0); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="mesh-bg"></div>

<div class="luxe-card">
    <div class="crown-icon">👑</div>

    <div class="profile-wrap">
        <div class="outer-glow"></div>
        <img src="divya.jpg" class="profile-img" alt="Queen Divya">
    </div>

    <p class="text-[11px] tracking-[10px] text-amber-400 font-bold mb-4 uppercase">
        Royal Excellency
    </p>

    <h1 class="royal-name">DIVYA</h1>

    <p class="quote-text">
        Modern Grace, Royal Mind.
    </p>

    <p class="text-gray-400 text-sm leading-relaxed mb-8 px-4">
        Every goal you achieve is a jewel in your crown. <br>
        Proceed to your kingdom and conquer the challenges ahead.
    </p>

    <div class="flex flex-col gap-5 items-center">
        <a href="sets.html" class="btn-royal">Enter Kingdom</a>
        
        <a href="progress.html" class="text-[10px] tracking-[5px] text-gray-500 hover:text-white uppercase transition-all duration-300">
            View Royal Archives
        </a>
    </div>
</div>

<script>
    function spawnParticle() {
        const icons = ['✨', '💎', '🌟', '👑'];
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = icons[Math.floor(Math.random() * icons.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = (Math.random() * 20 + 10) + 'px';
        p.style.animation = `rise ${Math.random() * 5 + 5}s linear forwards`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 10000);
    }
    setInterval(spawnParticle, 1500);
</script>

</body>
</html>
